<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Generating Of AIssac</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui">
    <div id="stats-bar">
      <div id="hearts-grid" class="hearts-grid" aria-label="Health"></div>
      <div id="resource-counters" class="resource-counters">
        <div class="resource-item">
          <span class="resource-icon resource-icon-penny" aria-hidden="true"></span>
          <span id="penny-count" class="resource-count">0</span>
        </div>
        <div class="resource-item">
          <span class="resource-icon resource-icon-key" aria-hidden="true"></span>
          <span id="key-count" class="resource-count">0</span>
        </div>
        <div class="resource-item">
          <span class="resource-icon resource-icon-bomb" aria-hidden="true"></span>
          <span id="bomb-count" class="resource-count">1</span>
        </div>
      </div>
    </div>
    <div id="info-hud">
      <span id="room-name">Room</span>
      <span id="controls">WASD — body &nbsp;|&nbsp; Arrows — aim &amp; shoot &nbsp;|&nbsp; E — place bomb</span>
      <span id="room-id"></span>
    </div>
    <div id="boss-bar" class="boss-bar" aria-hidden="true">
      <span id="boss-bar-name" class="boss-bar-name"></span>
      <div class="boss-bar-track">
        <div id="boss-bar-fill" class="boss-bar-fill"></div>
      </div>
    </div>
    <div id="item-pickup-banner" class="item-pickup-banner hidden" aria-live="polite">
      <span id="item-pickup-name" class="item-pickup-name"></span>
      <span id="item-pickup-flavor" class="item-pickup-flavor"></span>
    </div>
    <div id="item-bar" class="item-bar empty" aria-label="Collected items"></div>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
